site_name: TQL Software Development Academy
site_description: Course materials — Web API, HTML/CSS, and React
site_url: https://craigmckeachie.github.io/academy-resources/
repo_url: https://github.com/craigmckeachie/academy-resources
repo_name: craigmckeachie/academy-resources
edit_uri: ""            # source is authored in a private repo — hide the edit button

docs_dir: materials

# Instructor-only authoring conventions — build them into the site? No.
exclude_docs: |
  CLAUDE.md

theme:
  name: material
  logo: assets/max-logo.png
  favicon: assets/max-logo.png
  palette:
    - scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.indexes      # section README acts as the section landing page
    - navigation.top          # back-to-top button
    - navigation.tracking     # URL updates to the anchor in view
    - toc.follow              # right-hand TOC follows scroll
    - content.code.copy       # copy button on code blocks
    - search.highlight
    - search.suggest

plugins:
  - search
  - awesome-pages            # section titles + lesson ordering via .pages files

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html               # allow the centered <img> / HTML in the markdown
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
